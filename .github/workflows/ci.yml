name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "articles/**"
      - "books/**"
      - "scripts/**"
      - ".markdown-link-check.json"
      - ".markdownlint-cli2.jsonc"
      - ".textlintrc.json"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run textlint
        run: npm run lint:text

      - name: Run markdownlint
        run: npm run lint:md

      - name: Check links
        run: npm run lint:link

      - name: Zenn metadata validation
        run: npm run validate:meta
